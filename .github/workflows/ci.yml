name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  enforce-rebase:
    name: Enforce Linear History
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch main branch
        run: git fetch origin main:main

      - name: Check if branch is rebased on main
        run: |
          if git merge-base --is-ancestor main HEAD; then
            echo "✅ Branch is up-to-date with main."
          else
            echo "❌ Error: Your branch is out of date with main."
            echo "You must pull and rebase before pushing."
            echo "Please run locally: git pull --rebase origin main"
            exit 1
          fi

      - name: Check for merge commits
        run: |
          MERGE_COMMITS=$(git log main..HEAD --merges --oneline)
          if [ -n "$MERGE_COMMITS" ]; then
            echo "❌ Error: Merge commits are not allowed."
            echo "Please use 'git pull --rebase origin main' instead of git merge."
            echo "Merge commits found:"
            echo "$MERGE_COMMITS"
            exit 1
          fi

  build-and-lint:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Project
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: build-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deployment Placeholder
        run: |
          echo "🚀 Preparing for deployment..."
          echo "You haven't set up a deployment target yet."
          echo "Add your deployment scripts or Vercel action here!"
